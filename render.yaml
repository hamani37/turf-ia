services:
  - type: web
    name: turf-ultimate-api
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "@Hamani37"
      - key: BANKROLL_INITIAL
        value: "500"
      - key: KELLY_FRACTION
        value: "0.25"
      - key: MAX_BET_PCT
        value: "0.05"
      - key: MIN_EDGE
        value: "0.10"
      - key: SECRET_KEY
        generateValue: true

  - type: cron
    name: turf-ultimate-checker
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "*/30 * * * *"
    command: python scripts/check_results.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "@Hamani37"

  - type: cron
    name: turf-ultimate-morning
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 7 * * *"
    command: python scripts/morning_analysis.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "@Hamani37"

  - type: web
    name: turf-ultimate-dashboard
    runtime: static
    plan: free
    region: frankfurt
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: turf-ultimate-api
          property: host
          envVarKey: REACT_APP_API_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
